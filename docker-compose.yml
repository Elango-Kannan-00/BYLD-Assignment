services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: byld_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - byld_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d byld_portfolio"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: BYLD Portfolio API
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/byld_portfolio
    ports:
      - "8000:8000"

volumes:
  byld_postgres_data:
